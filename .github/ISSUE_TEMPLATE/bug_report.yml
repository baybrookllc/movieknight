name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: Paste any browser console errors (F12 → Console) or screenshots here.

  - type: dropdown
    id: page
    attributes:
      label: Which page or feature is affected?
      options:
        - Home / For You
        - Browse / Filters
        - Search / Mood
        - Title Detail
        - Watch Tracking (status/episodes)
        - Lists / Watchlists
        - Friends / Activity
        - Messages
        - Calendar
        - Profile
        - Authentication (Login/Signup)
        - Content Warnings (DTDD)
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 124, Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Check the version in the bottom right footer.
      placeholder: e.g. v1.4.3
