name: Deployment Notification

on:
  deployment_status:

jobs:
  notify:
    name: Notify on Deployment
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success' || github.event.deployment_status.state == 'failure'

    steps:
      - name: Post deployment summary
        uses: actions/github-script@v7
        with:
          script: |
            const state = context.payload.deployment_status.state;
            const env = context.payload.deployment_status.environment;
            const url = context.payload.deployment_status.target_url;
            const emoji = state === 'success' ? '✅' : '❌';
            const sha = context.payload.deployment.sha.substring(0, 7);

            const body = [
              `## ${emoji} Deployment ${state.toUpperCase()}`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Environment** | \`${env}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **URL** | ${url ? `[${url}](${url})` : 'N/A'} |`,
              `| **Time** | ${new Date().toUTCString()} |`,
            ].join('\n');

            // Comment on related PR if one exists
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.deployment.sha,
            });

            for (const pr of pulls) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
