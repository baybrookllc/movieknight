name: Deploy Supabase Migrations

on:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'

jobs:
  deploy-migrations:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Deploy migrations to production
        run: supabase db push --linked --project-ref nwvliipxqedueskhxdym
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployment
        run: |
          echo "✅ Migrations deployed successfully"
          echo "Deployed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const commit = context.payload.head_commit;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Supabase migration deployment failed** for commit ${commit.id.substring(0, 7)}\n\nCheck the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`
            });
